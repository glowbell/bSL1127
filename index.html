<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品情報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--green:#1a6e43;--green-light:#e8f5ee;--amber:#b45309;--amber-bg:#fef3c7;--border:#e5e7eb;--bg:#f3f4f6;--white:#fff;--text:#111827;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:600px;margin:0 auto}
.topbar{background:var(--green);padding:13px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{color:#fff;font-size:15px;font-weight:700}
.topbar-sub{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.list-section{padding:16px 20px}
.list-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:10px}
.list-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,transform .1s;text-decoration:none;color:inherit}
.list-item:hover{border-color:var(--green);transform:translateX(2px)}
.list-icon{width:38px;height:38px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.list-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8}
.list-info{flex:1}
.list-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.list-name{font-size:14px;font-weight:700;margin-top:2px}
.list-loc{font-size:11px;color:var(--muted);margin-top:2px}
.list-arrow svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2.5}
.error-box{margin:40px 20px;background:var(--white);border-radius:12px;padding:32px;text-align:center;border:1px solid #e5e7eb}
.error-box p{font-size:14px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">各試験結果</span>
  <span class="topbar-sub" id="topbar-sub"></span>
</div>
<div id="app"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwkLbARl1BjZPGMsVezP0nKoqkRpjHxdzoqfIahtax7IZCmtCJjjUHWO5tuFOiJg/pub?gid=1307910431&single=true&output=csv";

async function fetchData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = text.trim().split("\n").map(r => {
    const result = [];
    let cur = "", inQ = false;
    for(let i=0;i<r.length;i++){
      if(r[i]==='"'){inQ=!inQ;}
      else if(r[i]===','&&!inQ){result.push(cur.trim());cur="";}
      else{cur+=r[i];}
    }
    result.push(cur.trim());
    return result;
  });
  const headers = rows.shift().map(h => h.replace(/"/g,'').trim());
  return rows
    .filter(r => r.some(c => c && !c.includes('など') && !c.includes('YYYY') && !c.includes('ドライブ')))
    .map(r => Object.fromEntries(headers.map((h,i) => [h,(r[i]||"").replace(/"/g,'').trim()])));
}

function iconSvg(){return`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;}
function arrowSvg(){return`<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;}

function showList(data) {
  document.getElementById('topbar-sub').textContent = '設備一覧';
  const coGroups = {};
  data.forEach(d => {
    if (!coGroups[d.company]) coGroups[d.company] = [];
    coGroups[d.company].push(d);
  });
  let html = '<div class="list-section">';
  Object.entries(coGroups).forEach(([co, items]) => {
    html += `<div class="list-label">${co}社の設備</div>`;
    items.forEach(item => {
      const url = `p.html?company=${encodeURIComponent(item.company)}&id=${encodeURIComponent(item.id)}`;
      html += `<a href="${url}" class="list-item">
        <div class="list-icon">${iconSvg()}</div>
        <div class="list-info">
          <div class="list-id">${item.id}</div>
          <div class="list-name">${item.name}</div>
          <div class="list-loc">${item.delivery_to || ''}</div>
        </div>
        <div class="list-arrow">${arrowSvg()}</div>
      </a>`;
    });
  });
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

(async () => {
  try {
    const data = await fetchData();
    showList(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-box"><p>データの読み込みに失敗しました<br><small>${e.message}</small></p></div>`;
  }
})();
</script>
</body>
</html>
